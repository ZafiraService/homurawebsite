version: '3.8'

services:
  homura:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "file:./prisma/prod.db"
      JWT_SECRET: ${JWT_SECRET:-homura_secret_key_2024_secure}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-support@homura}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-homurasupportstaff}
      PORT: 3000
      NODE_ENV: production
    volumes:
      - ./prisma:/app/prisma
      - ./public:/app/public
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
